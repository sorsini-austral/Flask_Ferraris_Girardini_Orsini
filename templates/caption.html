{% extends 'base.html' %}

{% block content %}
<div class="text-center mb-5">
    <h2 class="fw-bold">El texto y los hashtags</h2>
    <p class="text-muted">¿Sirve escribir un testamento o meter 30 hashtags en la descripción?</p>
</div>

<div class="row g-4 mb-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-4 text-center h-100">
            <h5 class="mb-3 fw-bold">Longitud del Caption</h5>
            <img src="{{ url_for('static', filename='plots/' + plot1) }}" alt="Longitud Caption"
                class="img-fluid rounded">
        </div>
    </div>
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-4 text-center h-100">
            <h5 class="mb-3 fw-bold">Uso de Hashtags</h5>
            <img src="{{ url_for('static', filename='plots/' + plot2) }}" alt="Hashtags" class="img-fluid rounded">
        </div>
    </div>
</div>
{% endblock %}
