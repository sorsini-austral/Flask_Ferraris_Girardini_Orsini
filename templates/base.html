<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Reels Dashboard</title>
    <!-- CSS Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    
    <nav class="navbar bg-white custom-navbar shadow-sm mb-4 py-3">
        <div class="container d-flex flex-column align-items-center">
            <span class="navbar-brand fw-bold mb-3 h1 custom-gradient-text">¿Qué hace que un reel sea viral?</span>

            <ul class="nav justify-content-center">
                <li class="nav-item">
                    <a class="nav-link text-dark fw-semibold" href="/">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark fw-semibold" href="/perfil">Perfil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark fw-semibold" href="/audio">Audio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark fw-semibold" href="/imagen">Imagen</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark fw-semibold" href="/interacciones">Interacciones</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark fw-semibold" href="/caption">Caption</a>
                </li>
            </ul>
        </div>
    </nav>
    
    <main class="container flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-4 mt-auto">
        <small>TP 3 - Análisis de Reels de Instagram</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
