{% extends 'base.html' %}

{% block content %}
<div class="text-center mb-5">
    <h2 class="fw-bold">Análisis de Audio</h2>
    <p class="text-muted">¿Cómo influye el audio en tendencia en la viralidad?</p>
    <div class="alert alert-info d-inline-block mt-3 shadow-sm border-0">
        Usar un audio en tendencia mejora la viralidad promedio en un <strong>{{ trending_improvement }}%</strong>.
    </div>
</div>

<div class="row g-4 mb-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-4 text-center h-100">
            <h5 class="mb-3 fw-bold">Audio Trending vs No Trending</h5>
            <img src="{{ url_for('static', filename='plots/' + plot1) }}" alt="Audio Trending" class="img-fluid rounded">
        </div>
    </div>
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-4 text-center h-100">
            <h5 class="mb-3 fw-bold">Popularidad vs Engagement</h5>
            <img src="{{ url_for('static', filename='plots/' + plot2) }}" alt="Audio Popularity" class="img-fluid rounded">
        </div>
    </div>
</div>
{% endblock %}
