{% extends 'base.html' %}

{% block content %}
<div class="text-center mb-5">
    <h2 class="fw-bold">Calidad de Imagen y Video</h2>
    <p class="text-muted">Impacto de la resolución y calidad visual.</p>
    <div class="alert alert-info d-inline-block mt-3 shadow-sm border-0">
        Correlación con viralidad: Gancho Inicial (<strong>{{ corr_hook }}</strong>) | Calidad de Video (<strong>{{ corr_quality }}</strong>)
    </div>
</div>

<div class="row g-4 mb-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-4 text-center h-100">
            <h5 class="mb-3 fw-bold">Viralidad según Duración</h5>
            <img src="{{ url_for('static', filename='plots/' + plot1) }}" alt="Duración" class="img-fluid rounded">
        </div>
    </div>
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-4 text-center h-100">
            <h5 class="mb-3 fw-bold">Factores Visuales más Importantes</h5>
            <img src="{{ url_for('static', filename='plots/' + plot2) }}" alt="Factores Visuales" class="img-fluid rounded">
        </div>
    </div>
</div>
{% endblock %}
